<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>모두를 위한 옹달샘 지도</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=27f59fa5635cc98fba48941abe374192&libraries=services"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; background: #f8fbfe; color: #333; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #header { background: white; padding: 0 20px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #1DA1D2; height: 60px; flex-shrink: 0; }
    #header img { height: 35px; } 
    #header h2 { margin: 0; font-size: 18px; font-weight: 800; color: #1DA1D2; }
    #main-wrapper { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    #map { height: 45%; width: 100%; background: #eee; }
    .form-container { padding: 20px; background: white; flex: 1; overflow-y: auto; box-sizing: border-box; border-top: 1px solid #eee; }
    @media (min-width: 768px) {
      #main-wrapper { flex-direction: row; } 
      #map { flex: 1.6; height: 100% !important; border-top: none; border-right: 1px solid #eee; }
      .form-container { flex: 1; max-width: 400px; }
    }
    .search-box { display: flex; gap: 4px; margin-bottom: 12px; }
    input, select, textarea { width: 100%; margin-bottom: 10px; padding: 0 12px; border: 1.5px solid #e3eef6; border-radius: 10px; box-sizing: border-box; font-size: 14px; height: 45px; outline: none; }
    textarea { height: 80px !important; padding: 12px; }
    #searchBtn { width: 70px; height: 45px; background: #1DA1D2; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; flex-shrink: 0; }
    #submitBtn { width: 100%; padding: 15px; background: #1DA1D2; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 16px; }
    #submitBtn:disabled { background: #ccc !important; }
    #searchList { list-style: none; padding: 0; margin: -5px 0 10px 0; max-height: 150px; overflow-y: auto; border: 1px solid #e3eef6; border-radius: 10px; display: none; background: white; position: relative; z-index: 10; }
    #searchList li { padding: 10px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 13px; }
    .iw-container { padding: 15px; min-width: 200px; font-size: 13px; line-height: 1.5; }
    .iw-title { font-size: 15px; font-weight: 800; color: #1DA1D2; margin-bottom: 5px; display: block; }
    .iw-tag { display: inline-block; padding: 2px 6px; background: #eaf7fd; color: #168db9; border-radius: 4px; font-size: 11px; margin-right: 4px; }
    .iw-memo { color: #666; margin-top: 8px; border-top: 1px dashed #eee; padding-top: 8px; white-space: pre-wrap; }
    .report-btn { margin-top: 10px; width: 100%; padding: 8px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 5px; font-size: 11px; cursor: pointer; color: #777; }
    #footer { background: white; padding: 20px; text-align: center; border-top: 1px solid #eee; flex-shrink: 0; }
    #footer img { height: 60px; margin-bottom: 8px; }
    #footer p { margin: 0; font-size: 12px; color: #999; }
  </style>
</head>
<body>

<div id="header">
  <img src="https://cdn.imweb.me/thumbnail/20251128/b7491b79114f2.png" alt="옹달샘 로고">
  <h2>모두를 위한 옹달샘 지도</h2>
</div>

<div id="main-wrapper">
  <div id="map"></div>
  <div class="form-container">
    <div class="search-box">
      <input type="text" id="keyword" placeholder="장소명 검색" onkeypress="if(event.keyCode==13) { searchPlaces(); return false; }">
      <button id="searchBtn" onclick="searchPlaces()">검색</button>
    </div>
    <ul id="searchList"></ul>

    <input type="text" id="placeName" placeholder="장소명">
    <input type="text" id="address" placeholder="도로명 주소" readonly>
    <input type="hidden" id="lat"><input type="hidden" id="lng">

    <div style="display: flex; gap: 8px;">
      <select id="placeType">
        <option value="">장소 유형</option>
        <option value="카페">카페</option><option value="식당">식당</option><option value="공공기관">공공기관</option><option value="기타">기타</option>
      </select>
      <select id="waterType">
        <option value="">제공 유형</option>
        <option value="물병 비치">물병 비치</option><option value="직원 문의">직원 문의</option><option value="정수기">정수기</option><option value="음수대">음수대</option>
      </select>
    </div>
    <textarea id="memo" placeholder="추가 메모를 입력해주세요."></textarea>
    <button id="submitBtn" onclick="sendReport()">제보하기</button>
  </div>
</div>

<div id="footer">
  <img src="https://cdn.imweb.me/thumbnail/20240318/32f45df1c6e8a.png" alt="여성환경연대 로고">
  <p>© 여성환경연대 All rights reserved.</p>
</div>

<script>
  var map, ps, tempMarker, infowindow;
  // ⚠️ 본인의 GAS 웹앱 URL 입력
  const GAS_URL = "https://script.google.com/macros/s/AKfycbx7_zTlamIhzCHU1_e0B95T3PsITQ0Nw4LmS6GmH8jM3eSKesVe54Knix9niMFWL_ItkA/exec"; 
  const markerImg = new kakao.maps.MarkerImage("https://cdn.imweb.me/thumbnail/20251128/b7491b79114f2.png", new kakao.maps.Size(35, 35));

  window.onload = function() {
    var container = document.getElementById('map');
    map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(37.5665, 126.9780), level: 4 });
    ps = new kakao.maps.services.Places();
    tempMarker = new kakao.maps.Marker({ image: markerImg });
    infowindow = new kakao.maps.InfoWindow({ zIndex: 5, removable: true });

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(pos) {
        map.setCenter(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude));
      });
    }

    setTimeout(() => { map.relayout(); }, 500);

    // 데이터 로드 (시트 열 순서: A일련번호, B일시, C장소명, D주소, E위도, F경도, G장소유형, H제공유형, I메모, J승인상태)
    fetch(GAS_URL).then(res => res.json()).then(data => {
      data.forEach(loc => {
        // J열(승인상태)이 '승인'인 데이터만 지도에 마커 생성
        if (loc.승인상태 === "승인") {
          var m = new kakao.maps.Marker({ 
            map: map, 
            position: new kakao.maps.LatLng(loc.위도, loc.경도), 
            image: markerImg 
          });
          
          kakao.maps.event.addListener(m, 'click', function() {
            var content = `
              <div class="iw-container">
                <span class="iw-title">${loc.장소명}</span>
                <span class="iw-tag">${loc.장소유형}</span><span class="iw-tag">${loc.제공유형}</span>
                <div class="iw-memo">${loc.메모 || '등록된 메모가 없습니다.'}</div>
                <button class="report-btn" onclick="openModify('${loc.일련번호}', '${loc.장소명}')">정보 수정/삭제 신고</button>
              </div>`;
            infowindow.setContent(content);
            infowindow.open(map, m);
          });
        }
      });
    });
  };

  function searchPlaces() {
    var keyword = document.getElementById('keyword').value;
    if (!keyword) return alert('장소명을 입력하세요.');
    ps.keywordSearch(keyword, (data, status) => {
      var listEl = document.getElementById('searchList');
      listEl.innerHTML = "";
      if (status === kakao.maps.services.Status.OK) {
        listEl.style.display = "block";
        data.forEach(place => {
          var addr = place.road_address_name || place.address_name;
          var li = document.createElement('li');
          li.innerHTML = `<b>${place.place_name}</b><br><small>${addr}</small>`;
          li.onclick = () => {
            document.getElementById('placeName').value = place.place_name;
            document.getElementById('address').value = addr;
            document.getElementById('lat').value = place.y;
            document.getElementById('lng').value = place.x;
            var loc = new kakao.maps.LatLng(place.y, place.x);
            tempMarker.setPosition(loc); tempMarker.setMap(map); map.setCenter(loc);
            listEl.style.display = "none";
          };
          listEl.appendChild(li);
        });
      } else { alert('검색 결과가 없습니다.'); }
    });
  }

  function sendReport() {
    const btn = document.getElementById('submitBtn');
    const name = document.getElementById('placeName').value;
    if(!name || !document.getElementById('lat').value) return alert("장소를 검색하여 선택해주세요.");

    btn.disabled = true; btn.innerText = "전송 중...";

    const payload = {
      action: "new", 
      장소명: name,
      주소: document.getElementById('address').value,
      위도: document.getElementById('lat').value,
      경도: document.getElementById('lng').value,
      장소유형: document.getElementById('placeType').value,
      제공유형: document.getElementById('waterType').value,
      메모: document.getElementById('memo').value
    };

    fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) })
    .then(() => { alert("제보 완료! 관리자 승인 후 지도에 나타납니다."); location.reload(); })
    .catch(() => { alert("오류 발생"); btn.disabled = false; btn.innerText = "제보하기"; });
  }

  function openModify(id, name) {
    var reason = prompt(`[${name}] 수정 또는 삭제가 필요한 이유를 적어주세요.`);
    if(!reason) return;
    fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({ action: "modify", 일련번호: id, 장소명: name, 수정요청사항: reason })
    }).then(() => alert("신고가 접수되었습니다."));
  }
</script>
</body>
</html>
