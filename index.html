<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>모두를 위한 옹달샘 지도</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=27f59fa5635cc98fba48941abe374192&libraries=services"></script>
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #header { background: #1DA1D2; color: white; padding: 15px; text-align: center; }
    #map { width: 100%; height: 80vh; background: #f0f0f0; }
    .info { padding: 20px; text-align: center; color: #666; }
  </style>
</head>
<body>

<div id="header">
  <h2>📍 옹달샘 지도 (테스트)</h2>
</div>

<div id="map"></div>

<div class="info">
  <p>지도가 정상적으로 보인다면 성공입니다!</p>
</div>

<script>
  var map;
  const GAS_URL = "https://script.google.com/macros/s/AKfycbx7_zTlamIhzCHU1_e0B95T3PsITQ0Nw4LmS6GmH8jM3eSKesVe54Knix9niMFWL_ItkA/exec"; 

  window.onload = function() {
    var container = document.getElementById('map');
    map = new kakao.maps.Map(container, {
      center: new kakao.maps.LatLng(37.5665, 126.9780),
      level: 4
    });

    // 마법의 문장: GAS에서 데이터를 가져와서 마커를 찍어라!
    fetch(GAS_URL)
      .then(response => response.json())
      .then(locations => {
        locations.forEach(loc => {
          var marker = new kakao.maps.Marker({
            map: map,
            position: new kakao.maps.LatLng(loc.lat, loc.lng)
          });
          // 마커 클릭 시 정보창 띄우기 로직 추가...
          console.log("데이터 불러오기 성공:", loc.name);
        });
      });
  };
</script>

</body>
</html>
