<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>모두를 위한 옹달샘 지도</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=27f59fa5635cc98fba48941abe374192&libraries=services"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; background: #f8fbfe; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
    
    /* 헤더: 옹달샘 로고 */
    #header { background: white; padding: 12px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 3px solid #1DA1D2; height: 60px; box-sizing: border-box; }
    #header img { height: 35px; } 
    #header h2 { margin: 0; font-size: 18px; font-weight: 800; color: #1DA1D2; }
    
    #main-wrapper { display: flex; flex-direction: column; flex: 1; }
    #map { height: 40vh; width: 100%; border-bottom: 1px solid #e0e0e0; background: #eee; }
    .form-container { padding: 20px; background: white; flex: 1; }
    
    @media (min-width: 768px) {
      #main-wrapper { flex-direction: row; height: calc(100vh - 140px); }
      #map { flex: 1.5; height: 100% !important; }
      .form-container { flex: 1; overflow-y: auto; max-width: 420px; border-left: 1px solid #eee; }
    }

    .search-box { display: flex; gap: 8px; margin-bottom: 10px; }
    input, select, textarea { width: 100%; margin-bottom: 12px; padding: 12px; border: 1.5px solid #e3eef6; border-radius: 10px; box-sizing: border-box; font-size: 14px; font-family: inherit; }
    #searchBtn { width: 80px; background: #1DA1D2; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
    #submitBtn { width: 100%; padding: 16px; background: #333; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 16px; }
    #searchList { list-style: none; padding: 0; margin: 0 0 15px 0; max-height: 180px; overflow-y: auto; border: 1px solid #e3eef6; border-radius: 10px; display: none; }
    #searchList li { padding: 10px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 13px; }
    #searchList li:hover { background: #eaf7fd; }

    /* 푸터: 여성환경연대 로고 */
    #footer { background: #f9f9f9; padding: 20px; text-align: center; border-top: 1px solid #eee; }
    #footer img { height: 30px; margin-bottom: 8px; }
    #footer p { margin: 0; font-size: 12px; color: #888; }
  </style>
</head>
<body>

<div id="header">
  <img src="https://cdn.imweb.me/thumbnail/20251128/b7491b79114f2.png" alt="옹달샘 로고">
  <h2>모두를 위한 옹달샘 지도</h2>
</div>

<div id="main-wrapper">
  <div id="map"></div>
  <div class="form-container">
    <div class="search-box">
      <input type="text" id="keyword" placeholder="장소명 검색" onkeypress="if(event.keyCode==13) searchPlaces()">
      <button id="searchBtn" onclick="searchPlaces()">검색</button>
    </div>
    <ul id="searchList"></ul>

    <input type="text" id="placeName" placeholder="장소 이름">
    <input type="text" id="address" placeholder="주소" readonly>
    <input type="hidden" id="lat"><input type="hidden" id="lng">

    <div style="display: flex; gap: 8px;">
      <select id="placeType">
        <option value="">장소 유형 *</option>
        <option value="카페">카페</option><option value="식당">식당</option><option value="공공기관">공공기관</option><option value="기타">기타</option>
      </select>
      <select id="waterType">
        <option value="">물 제공 방식 *</option>
        <option value="물병 비치">물병 비치</option><option value="직원 문의">직원 문의</option><option value="정수기">정수기</option><option value="음수대">음수대</option>
      </select>
    </div>
    <textarea id="memo" rows="2" placeholder="추가 메모"></textarea>
    <button id="submitBtn" onclick="sendReport()">제보하기</button>
  </div>
</div>

<div id="footer">
  <img src="http://ecofem.or.kr/wp-content/uploads/2016/11/logo_ecofem.png" alt="여성환경연대 로고">
  <p>© 여성환경연대 All rights reserved.</p>
</div>

<script>
  var map, ps, geocoder, tempMarker, infowindow;
  // ⚠️ 본인의 GAS 배포 URL을 입력하세요
  const GAS_URL = "https://script.google.com/macros/s/AKfycbx7_zTlamIhzCHU1_e0B95T3PsITQ0Nw4LmS6GmH8jM3eSKesVe54Knix9niMFWL_ItkA/exec"; 
  const markerImg = new kakao.maps.MarkerImage("https://cdn.imweb.me/thumbnail/20251128/b7491b79114f2.png", new kakao.maps.Size(35, 35));

  window.onload = function() {
    var container = document.getElementById('map');
    map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(37.5665, 126.9780), level: 4 });
    ps = new kakao.maps.services.Places();
    geocoder = new kakao.maps.services.Geocoder();
    tempMarker = new kakao.maps.Marker({ image: markerImg });
    infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

    fetch(GAS_URL).then(res => res.json()).then(locations => {
      locations.forEach(loc => {
        var m = new kakao.maps.Marker({ map: map, position: new kakao.maps.LatLng(loc.lat, loc.lng), image: markerImg });
        kakao.maps.event.addListener(m, 'click', function() {
          infowindow.setContent(`<div style="padding:10px;font-size:12px;"><b>${loc.name}</b><br>${loc.waterType}</div>`);
          infowindow.open(map, m);
        });
      });
    });

    kakao.maps.event.addListener(map, 'click', function(e) {
      displaySelectedPlace(e.latLng.getLat(), e.latLng.getLng(), "");
    });
  };

  function searchPlaces() {
    var keyword = document.getElementById('keyword').value;
    if (!keyword) return alert('검색어를 입력하세요!');
    ps.keywordSearch(keyword, (data, status) => {
      var listEl = document.getElementById('searchList');
      listEl.innerHTML = "";
      if (status === kakao.maps.services.Status.OK) {
        listEl.style.display = "block";
        data.forEach(place => {
          var li = document.createElement('li');
          li.innerHTML = `<b>${place.place_name}</b><br><small>${place.address_name}</small>`;
          li.onclick = () => {
            document.getElementById('placeName').value = place.place_name;
            document.getElementById('address').value = place.address_name;
            displaySelectedPlace(place.y, place.x, place.place_name);
            listEl.style.display = "none";
          };
          listEl.appendChild(li);
        });
      } else { alert('결과가 없습니다.'); }
    });
  }

  function displaySelectedPlace(lat, lng, name) {
    var loc = new kakao.maps.LatLng(lat, lng);
    document.getElementById('lat').value = lat;
    document.getElementById('lng').value = lng;
    tempMarker.setPosition(loc); tempMarker.setMap(map); map.setCenter(loc);
    if(!name) {
      geocoder.coord2Address(lng, lat, (result, status) => {
        if (status === kakao.maps.services.Status.OK) {
          document.getElementById('address').value = result[0].address.address_name;
        }
      });
    }
  }

  function sendReport() {
    const data = {
      name: document.getElementById('placeName').value,
      address: document.getElementById('address').value,
      lat: document.getElementById('lat').value,
      lng: document.getElementById('lng').value,
      placeType: document.getElementById('placeType').value,
      waterType: document.getElementById('waterType').value,
      memo: document.getElementById('memo').value
    };
    if(!data.name || !data.lat) return alert("장소를 선택해주세요!");
    fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) })
    .then(() => { alert("제보 완료!"); location.reload(); });
  }
</script>
</body>
</html>
