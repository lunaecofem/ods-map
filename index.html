<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>모두를 위한 옹달샘 지도</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=27f59fa5635cc98fba48941abe374192&libraries=services"></script>
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #header { background: #1DA1D2; color: white; padding: 15px; text-align: center; }
    #map { width: 100%; height: 80vh; background: #f0f0f0; }
    .info { padding: 20px; text-align: center; color: #666; }
  </style>
</head>
<body>

<div id="header">
  <h2>📍 옹달샘 지도 (테스트)</h2>
</div>

<div id="map"></div>

<div class="info">
  <p>지도가 정상적으로 보인다면 성공입니다!</p>
</div>

<script>
  // 지도를 띄우는 아주 기본적인 코드
  window.onload = function() {
    var container = document.getElementById('map');
    var options = {
      center: new kakao.maps.LatLng(37.5665, 126.9780), // 서울 시청 기준
      level: 4
    };
    var map = new kakao.maps.Map(container, options);
    
    // 마커 하나 찍어보기
    var marker = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(37.5665, 126.9780),
      map: map
    });
  };
</script>

</body>
</html>
